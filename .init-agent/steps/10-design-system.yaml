id: design-system
title: "Init: 디자인 시스템 및 global style 세팅"
order: 10
enabled: true
summary: "스타일 라이브러리를 선택하고, 컬러/폰트 토큰과 global style을 프로젝트에 반영한다."

labels:
  - Init
  - Design System
  - Styles

dependsOn:
  - svgr

decision:
  type: style-system
  selected: tailwind
  reason: "MVP에서는 빠른 UI 구현과 토큰 기반 유틸리티 스타일링을 위해 Tailwind CSS를 기본 선택으로 둔다."
  alternatives:
    - tailwind
    - vanilla-extract

inputs:
  styleLibrary: tailwind
  target: mobile-web
  tokenSources:
    colors:
      - references/design-system/color-table.png
      - references/design-system/colors.md
    typography:
      - references/design-system/font-table.png
      - references/design-system/typography.md
  globalStyle:
    cssFile: src/shared/styles/global.css
    importLocation: src/main.tsx
    includeReset: true
    includeBodyBaseStyle: true
    includeCssVariables: true
  tailwind:
    version: 4
    importStyle: '@import "tailwindcss";'
    configFile: optional
    postcssConfigFile: optional
    content:
      - ./index.html
      - ./src/**/*.{ts,tsx}
  vanillaExtract:
    themeFile: src/shared/styles/theme.css.ts
    globalStyleFile: src/shared/styles/global.css.ts
  fonts:
    strategy: css-font-face-or-external-import
    cssVariables: true
  colors:
    strategy: design-token
    cssVariables: true
  install:
    dependencies: []
    devDependencies:
      - tailwindcss

references:
  - path: references/design-system/tailwind.md
    type: markdown
    required: false
  - path: references/design-system/vanilla-extract.md
    type: markdown
    required: false
  - path: references/design-system/colors.md
    type: markdown
    required: false
  - path: references/design-system/typography.md
    type: markdown
    required: false
  - path: references/design-system/global-css.md
    type: markdown
    required: false
  - path: references/design-system/color-table.png
    type: image
    required: false
  - path: references/design-system/font-table.png
    type: image
    required: false

tasks:
  - "선택한 스타일 라이브러리 관련 의존성을 설치한다."
  - "컬러/폰트 레퍼런스를 읽고 디자인 토큰을 정의한다."
  - "global CSS 레퍼런스를 읽고 reset, body 기본 스타일, CSS variable 적용 범위를 정의한다."
  - "global style 파일을 생성하고 앱 엔트리에 연결한다."
  - "컬러 토큰을 CSS variables 또는 선택한 스타일 시스템 설정에 반영한다."
  - "폰트 토큰과 기본 typography 스타일을 전역 스타일에 반영한다."
  - "Tailwind 선택 시 v4 방식의 @import 기반 설정을 우선 사용하고, 필요한 경우에만 config 파일을 생성한다."
  - "vanilla-extract 선택 시 theme.css.ts와 global.css.ts를 생성한다."
  - "references/design-system과 conventions 문서를 참고해 토큰 네이밍과 적용 범위를 조정한다."

acceptanceCriteria:
  - "선택한 스타일 라이브러리 의존성이 package.json에 추가된다."
  - "global style 파일이 존재하고 앱 엔트리에 import된다."
  - "모바일 웹 기준 root width와 viewport height 스타일이 반영된다."
  - "global style에는 reset 또는 기본 normalize 규칙이 포함된다."
  - "global style에는 body 기본 폰트, 배경색, 텍스트 색상이 포함된다."
  - "컬러 토큰이 코드에 반영된다."
  - "폰트 토큰 또는 font-face/import 규칙이 코드에 반영된다."
  - "기본 body 스타일이 설정된다."
  - "pnpm build 명령이 통과한다."

files:
  expected:
    - src/shared/styles/global.css
    - package.json
  avoid:
    - .github/workflows

verification:
  - "pnpm install"
  - "pnpm lint"
  - "pnpm format:check"
  - "pnpm build"
