id: tanstack-query
title: "Init: TanStack Query 세팅"
order: 7
enabled: true
summary: "app 폴더의 서버 상태 관리를 위해 TanStack Query를 설정하고 QueryClientProvider를 앱 provider 계층에 연결한다."

labels:
  - Init
  - State
  - Data Fetching

dependsOn:
  - router-absolute-path

decision:
  type: server-state-library
  selected: tanstack-query
  reason: "서버 상태의 캐싱, 재시도, 동기화, 로딩/에러 상태 관리를 명확히 분리하기 위해 TanStack Query를 사용한다."
  alternatives:
    - tanstack-query
    - swr
    - none

inputs:
  library: "@tanstack/react-query"
  devtools: true
  provider:
    queryClientFile: app/src/app/providers/query-client.ts
    providerFile: app/src/app/providers/query-provider.tsx
    providerLocation: app/src/app/App.tsx
  defaultOptions:
    queries:
      staleTime: 60000
      gcTime: 300000
      retry: 1
      refetchOnWindowFocus: false
  queryKey:
    style: array
    firstSegment: domain-name
  install:
    dependencies:
      - "@tanstack/react-query"
    devDependencies:
      - "@tanstack/react-query-devtools"

references:
  - path: references/tanstack-query/rules.md
    type: markdown
    required: false

tasks:
  - "TanStack Query 관련 의존성을 설치한다."
  - "QueryClient 생성 파일을 추가한다."
  - "QueryClientProvider를 제공하는 provider 컴포넌트를 추가한다."
  - "앱 provider 계층에 QueryClientProvider를 연결한다."
  - "개발 환경에서 React Query Devtools를 사용할 수 있게 설정한다."
  - "references/tanstack-query와 conventions 문서를 참고해 query key와 배치 규칙을 반영한다."

acceptanceCriteria:
  - "@tanstack/react-query 의존성이 app/package.json에 추가된다."
  - "QueryClient 생성 파일이 존재한다."
  - "QueryClientProvider가 앱에 연결된다."
  - "query key 규칙이 references 또는 step inputs에 명시된다."
  - "pnpm --dir app build 명령이 통과한다."

files:
  expected:
    - app/src/app/providers/query-client.ts
    - app/src/app/providers/query-provider.tsx
    - app/package.json
  avoid:
    - .github/workflows

verification:
  - "pnpm --dir app install"
  - "pnpm --dir app lint"
  - "pnpm --dir app format:check"
  - "pnpm --dir app build"
