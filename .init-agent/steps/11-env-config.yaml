id: env-config
title: "Init: 환경변수 설정"
order: 11
enabled: true
summary: "app 프로젝트에서 필요한 환경변수 이름, 예시 파일, secret 관리 규칙을 정리한다."

labels:
  - Init
  - Env
  - Security

dependsOn:
  - design-system

decision:
  type: environment-config
  selected: vite-env-example
  reason: "Vite 프로젝트에서는 클라이언트에 노출 가능한 환경변수만 VITE_ prefix로 관리하고, 실제 secret 값은 repo에 커밋하지 않는다."
  alternatives:
    - vite-env-example
    - framework-specific-env

inputs:
  envFiles:
    exampleFile: app/.env.example
    localFile: app/.env
    localFileCommitted: false
  vite:
    publicPrefix: VITE_
    requiredPublicVariables:
      - name: VITE_BASE_URL
        description: "API base URL"
        example: "https://api.example.com"
        usedBy:
          - http-client
  githubSecrets:
    required:
      - name: PERSONAL_REPO_PAT
        description: "CD workflow가 Vercel 연결용 개인 repo에 push하기 위한 GitHub token"
        usedBy:
          - ci-cd
  vercelEnvironmentVariables:
    required:
      - name: VITE_BASE_URL
        environment:
          - production
          - preview
  security:
    neverCommit:
      - app/.env
      - app/.env.local
      - app/.env.*.local
    allowCommit:
      - app/.env.example

references:
  - path: references/env-config/rules.md
    type: markdown
    required: false

tasks:
  - "app/.env.example 파일을 생성한다."
  - "Vite 공개 환경변수는 VITE_ prefix를 사용하도록 문서화한다."
  - "현재 프로젝트에서 필요한 VITE_BASE_URL 항목을 app/.env.example에 추가한다."
  - "GitHub Secrets에 등록해야 하는 PERSONAL_REPO_PAT를 문서화한다."
  - "Vercel Environment Variables에 등록해야 하는 VITE_BASE_URL를 문서화한다."
  - "app/.env, app/.env.local, app/.env.*.local이 git에 커밋되지 않도록 ignore 규칙을 확인한다."
  - "README 또는 env 문서에 로컬 환경변수 설정 방법을 추가한다."
  - "references/env-config와 conventions 문서를 참고해 환경변수 관리 규칙을 반영한다."

acceptanceCriteria:
  - "app/.env.example 파일이 존재한다."
  - "app/.env.example에는 VITE_BASE_URL이 포함된다."
  - "실제 secret 값은 repo에 포함되지 않는다."
  - ".env 관련 로컬 파일은 git ignore 대상이다."
  - "GitHub Secrets에 필요한 PERSONAL_REPO_PAT가 문서화된다."
  - "Vercel Environment Variables에 필요한 VITE_BASE_URL가 문서화된다."

files:
  expected:
    - app/.env.example
    - README.md
  avoid:
    - app/.env
    - app/.env.local
    - app/.env.production
    - app/.env.preview

verification:
  - "test -f app/.env.example"
  - "grep -q VITE_BASE_URL app/.env.example"
  - "pnpm --dir app lint"
  - "pnpm --dir app format:check"
  - "pnpm --dir app build"
