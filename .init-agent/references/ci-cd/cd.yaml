name: Sync to personal repo

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: sync-fork-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to personal repo
        run: |
          git push https://x-access-token:${{ secrets.PERSONAL_REPO_PAT }}@github.com/kimminna/38-COLLABORATION-WEB-NAVER.git ${{ github.ref_name }} --force
